<Directory /var/www/html>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted

    # Serve everything as UTF-8 unless the response sets its own charset.
    AddDefaultCharset utf-8

    RewriteEngine On
    # Route /api/* to api.php while preserving the original path in REQUEST_URI
    RewriteCond %{REQUEST_URI} ^/api(/|$)
    RewriteRule ^api(/.*)?$ api.php [QSA,L]
</Directory>
