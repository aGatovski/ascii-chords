<Directory /var/www/html>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted

    RewriteEngine On
    # Route /api/* to api.php while preserving the original path in REQUEST_URI
    RewriteCond %{REQUEST_URI} ^/api(/|$)
    RewriteRule ^api(/.*)?$ api.php [QSA,L]
</Directory>
