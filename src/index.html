<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASCII Chords</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar no-print">
    <div class="brand">
      <a href="#library">🎸 ASCII Chords</a>
    </div>
    <nav>
      <a href="#library">Library</a>
      <a href="#song/new">+ New song</a>
      <a href="#catalog">Public catalog</a>
      <a href="#chords">Chord dictionary</a>
      <a href="#help">Help</a>
    </nav>
    <div class="user-menu">
      <span id="user-label" class="muted"></span>
      <button id="logout-btn" class="link-btn">Sign out</button>
    </div>
  </header>

  <main id="view-root" class="container"></main>

  <!-- Hidden popover host -->
  <div id="chord-popover" class="popover hidden"></div>

  <!-- Toast host -->
  <div id="toast" class="toast hidden"></div>

  <!-- Templates -->
  <template id="tpl-library">
    <section class="library-view">
      <header class="library-header">
        <h2>Your songs</h2>
        <div class="library-controls">
          <input type="search" id="lib-search" placeholder="Search title or artist…" />
          <select id="lib-difficulty">
            <option value="">All difficulties</option>
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
          </select>
          <select id="lib-sort">
            <option value="updated_desc">Recently updated</option>
            <option value="updated_asc">Oldest updated</option>
            <option value="title_asc">Title A–Z</option>
            <option value="artist_asc">Artist A–Z</option>
            <option value="difficulty">By difficulty</option>
          </select>
          <a class="primary" href="#song/new">+ New song</a>
        </div>
      </header>
      <div id="lib-list" class="card-grid"></div>
      <p id="lib-empty" class="muted hidden">No songs yet. Click <b>+ New song</b> to start.</p>
    </section>
  </template>

  <template id="tpl-editor">
    <section class="editor-view">
      <header class="editor-meta-bar">
        <input type="text" id="meta-title"  placeholder="Song title"  class="big" />
        <input type="text" id="meta-artist" placeholder="Artist"      class="big" />
      </header>
      <div class="editor-meta-grid">
        <label>Album <input type="text" id="meta-album" /></label>
        <label>Year  <input type="number" id="meta-year" min="1900" max="2099" /></label>
        <label>Key   <input type="text" id="meta-key" placeholder="e.g. F#m" /></label>
        <label>Capo  <input type="number" id="meta-capo" min="0" max="12" value="0" /></label>
        <label>Tuning
          <select id="meta-tuning">
            <option>Standard</option><option>Drop D</option><option>Open G</option>
            <option>Open D</option><option>DADGAD</option><option>Half-Step Down</option>
          </select>
        </label>
        <label>Tempo (BPM)
          <input type="number" id="meta-bpm" min="40" max="240" value="120" />
        </label>
        <label>Difficulty
          <select id="meta-difficulty">
            <option>Beginner</option><option selected>Intermediate</option><option>Advanced</option>
          </select>
        </label>
        <label>Genre  <input type="text" id="meta-genre" /></label>
        <label class="checkbox">
          <input type="checkbox" id="meta-is-public" />
          <span>Make this song public</span>
        </label>
        <label class="full">Tags (comma separated)
          <input type="text" id="meta-tags" placeholder="classic-rock, blues" />
        </label>
        <label class="full">Notes
          <textarea id="meta-notes" rows="2"></textarea>
        </label>
      </div>

      <div class="editor-split">
        <textarea id="raw-editor" spellcheck="false"
                  placeholder="[Verse]&#10;&#10;C       G       Am      F&#10;Type your lyrics here&#10;&#10;e|--0--2--3--|&#10;B|--1--3--3--|&#10;G|--0--2--0--|&#10;D|--2--0--0--|&#10;A|--3--x--2--|&#10;E|--x--x--3--|"></textarea>
        <div id="preview" class="preview"></div>
      </div>

      <footer class="editor-toolbar">
        <div class="toolbar-row">
          <button id="play-btn"  class="primary">▶ Play</button>
          <button id="pause-btn">⏸ Pause</button>
          <button id="stop-btn">⏹ Stop</button>
          <label>BPM <input type="range" id="bpm-slider" min="40" max="240" value="120" /></label>
          <input type="number" id="bpm-display" min="40" max="240" value="120" />
          <label><input type="checkbox" id="metronome-toggle" /> Metronome</label>
        </div>
        <div class="toolbar-row">
          <button id="autoscroll-btn">↕ Autoscroll</button>
          <label>Speed <input type="range" id="autoscroll-speed" min="0.1" max="3.0" value="0.5" step="0.1" /></label>
          <span id="autoscroll-display">0.5×</span>
          <button id="transpose-down">– Transpose</button>
          <button id="transpose-up">Transpose +</button>
          <select id="accidental-select">
            <option value="sharp">♯ sharps</option>
            <option value="flat">♭ flats</option>
          </select>
          <span class="muted" id="capo-info"></span>
        </div>
        <div class="toolbar-row">
          <button id="save-btn"   class="primary">💾 Save</button>
          <button id="export-json-btn">⬇ Export JSON</button>
          <button id="export-txt-btn">⬇ Export TXT</button>
          <button id="print-btn">🖨 Print</button>
          <button id="delete-btn" class="danger">🗑 Delete</button>
          <span class="muted" id="save-status"></span>
        </div>
      </footer>
    </section>
  </template>

  <template id="tpl-chords-dict">
    <section class="chords-dict-view">
      <header><h2>Chord dictionary</h2>
        <input type="search" id="chord-search" placeholder="Search chord names…" />
        <button id="chord-builder-toggle" class="primary">+ New chord</button>
      </header>

      <section id="chord-builder" class="chord-builder hidden">
        <header class="cb-header">
          <h3>Visual chord builder</h3>
          <button id="cb-close" class="link-btn">close</button>
        </header>
        <div class="cb-grid">
          <label>Name <input type="text" id="cb-name" maxlength="20" placeholder="e.g. Cadd9" /></label>
          <label>Variant
            <select id="cb-variant">
              <option>1</option><option>2</option><option>3</option>
              <option>4</option><option>5</option>
            </select>
          </label>
          <label>Barre fret <input type="number" id="cb-barre" min="0" max="12" placeholder="(none)" /></label>
        </div>
        <div id="cb-fretboard" class="cb-fretboard" aria-label="Chord fretboard"></div>
        <p class="muted">Click on a fret to press it. Click the top row to toggle muted (✕) / open (○).
           Each string can have at most one pressed fret.</p>
        <div class="cb-actions">
          <pre id="cb-preview" class="cb-preview"></pre>
          <div>
            <button id="cb-save" class="primary">💾 Save chord</button>
            <button id="cb-reset">Reset</button>
          </div>
        </div>
      </section>

      <div id="chord-grid" class="chord-grid"></div>
    </section>
  </template>

  <template id="tpl-catalog">
    <section class="library-view">
      <header class="library-header">
        <h2>Public catalog</h2>
        <div class="library-controls">
          <input type="search" id="cat-search" placeholder="Search title or artist…" />
          <select id="cat-difficulty">
            <option value="">All difficulties</option>
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
          </select>
          <select id="cat-sort">
            <option value="updated_desc">Recently updated</option>
            <option value="title_asc">Title A–Z</option>
            <option value="artist_asc">Artist A–Z</option>
            <option value="difficulty">By difficulty</option>
          </select>
        </div>
      </header>
      <p class="muted">Songs published by other users. Click any to open in read-only view.</p>
      <div id="cat-list" class="card-grid"></div>
      <p id="cat-empty" class="muted hidden">No public songs yet.</p>
    </section>
  </template>

  <template id="tpl-help">
    <section class="help-view">
      <h2>How to read ASCII chords &amp; tabs</h2>

      <p>Songs in ASCII Chords are written as plain text. The parser recognises four
         kinds of lines, decided by what the line looks like.</p>

      <h3>1. Section headings — <code>[Verse]</code></h3>
      <p>Wrap a label in square brackets to mark a new section. It will render as a
         coloured heading. Common labels: <code>[Intro]</code>, <code>[Verse]</code>,
         <code>[Chorus]</code>, <code>[Bridge]</code>, <code>[Outro]</code>.</p>

      <h3>2. Chord lines</h3>
      <p>A line that contains <em>only</em> chord names (separated by spaces) is treated
         as a chord line. Place it directly above the lyric line so the chord aligns
         above the syllable where it changes.</p>
<pre>C       G       Am      F
This is the first line of lyrics.</pre>
      <p>Click any chord on screen to see its fingering and the notes it contains.
         Recognised chord shapes: major (<code>C</code>), minor (<code>Am</code>),
         seventh (<code>G7</code>), maj7 (<code>Cmaj7</code>), suspended
         (<code>Dsus4</code>), add (<code>Cadd9</code>), slash (<code>D/F#</code>),
         and any combination of these.</p>

      <h3>3. Tab blocks</h3>
      <p>Six consecutive lines each beginning with a string letter and a pipe form a
         tab block. The convention is <strong>top = high e, bottom = low E</strong>.
         Numbers are fret numbers, <code>x</code> means muted, <code>0</code> means
         open. Read left-to-right in time:</p>
<pre>e|--0--0--0--0--|
B|--1--1--1--1--|
G|--0--0--0--0--|
D|--2--2--2--2--|
A|--3--3--3--3--|
E|--x--x--x--x--|</pre>

      <h3>4. Lyric lines</h3>
      <p>Anything that isn't a section heading, chord line, or tab block is treated
         as lyrics. Empty lines become paragraph breaks.</p>

      <h3>Chord diagrams</h3>
      <p>The chord popover renders fingerings as a small ASCII grid. Strings are
         shown <strong>high e on the left, low E on the right</strong>; frets run from
         top to bottom (lowest fret first). The status row above the grid shows
         <code>✕</code> for muted, <code>○</code> for open, and a space for fretted.</p>

      <h3>Tunings</h3>
      <p>Set the song's tuning (Standard, Drop D, Open G, Open D, DADGAD, Half-Step
         Down) in the metadata grid. The Play button respects it: each string is
         pitch-shifted so the open strings sound at their correct retuned pitch.</p>

      <h3>Capo &amp; transposition</h3>
      <p>Capo is informational — it tells the parser what fret to assume for the
         <em>shape</em> you wrote. Transposition (<code>+ Transpose</code> /
         <code>– Transpose</code>) actually rewrites every chord and every fret
         number in tab blocks to a new key.</p>

      <h3>Saving private vs. public</h3>
      <p>By default every song is private — only you can see it. Tick
         <strong>Make this song public</strong> in the metadata grid to share it in
         the public catalog (anyone can read, but only you can edit or delete).</p>
    </section>
  </template>

  <script src="chords.js"></script>
  <script src="player.js"></script>
  <script src="autoscroll.js"></script>
  <script src="app.js"></script>
</body>
</html>
